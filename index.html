<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智绘乡遗 | AI驱动的非遗数字引擎</title>
    <!-- 引入思源宋体，增加国风高级感 -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0a0a0c;
            --gold: #d4af37;
            --gold-light: #f3e5ab;
            --accent-red: #8b0000;
            --neon-cyan: #00f3ff;
            --glass-bg: rgba(20, 20, 25, 0.6);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg-dark);
            color: #fff;
            overflow-x: hidden;
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(139, 0, 0, 0.15), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(212, 175, 55, 0.1), transparent 25%);
            background-attachment: fixed;
        }

        /* 字体渐变与特殊排版 */
        .title-font {
            font-family: 'Noto Serif SC', serif;
        }
        .gradient-text-gold {
            background: linear-gradient(135deg, var(--gold-light), var(--gold), #aa7c11);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .gradient-text-tech {
            background: linear-gradient(135deg, #fff, var(--neon-cyan));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* 顶部导航与英雄区 */
        header {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            text-align: center;
            padding: 0 20px;
        }
        
        /* 动态水墨背景图 (使用Unsplash的高清图并加上暗色遮罩) */
        .hero-bg {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://images.unsplash.com/photo-1547981609-4b6bfe67ca0b?ixlib=rb-4.0.3&auto=format&fit=crop&w=2000&q=80') center/cover;
            opacity: 0.3;
            z-index: -1;
            filter: contrast(1.2) grayscale(0.5);
        }
        .hero-bg::after {
            content: ''; position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, transparent, var(--bg-dark));
        }

        h1 {
            font-size: 6rem;
            letter-spacing: 1.5rem;
            margin-bottom: 20px;
            text-shadow: 0 0 40px rgba(212, 175, 55, 0.3);
            margin-left: 1.5rem; /* 补偿letter-spacing引起的居中偏移 */
        }
        .subtitle {
            font-size: 1.5rem;
            letter-spacing: 4px;
            color: #aaa;
            margin-bottom: 50px;
            font-weight: 300;
        }

        /* 毛玻璃容器 */
        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
        }

        /* 数据看板 */
        .stats-container {
            display: flex;
            gap: 40px;
            padding: 30px 60px;
            margin-top: -50px;
            z-index: 10;
        }
        .stat-item {
            text-align: center;
        }
        .stat-num {
            font-size: 3rem;
            font-weight: bold;
            font-family: 'Courier New', Courier, monospace;
            text-shadow: 0 0 15px rgba(0, 243, 255, 0.4);
        }
        .stat-label {
            font-size: 0.9rem;
            color: #888;
            letter-spacing: 2px;
            margin-top: 5px;
        }

        /* 核心工作区：AI矩阵 */
        .main-content {
            max-width: 1200px;
            margin: 100px auto;
            padding: 0 20px;
        }
        .section-header {
            text-align: center;
            margin-bottom: 60px;
        }
        .section-header h2 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }
        .section-header p {
            color: #888;
        }

        .ai-workspace {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
            padding: 40px;
            position: relative;
        }

        /* 酷炫上传框 */
        .upload-area {
            border: 2px dashed rgba(212, 175, 55, 0.3);
            border-radius: 16px;
            height: 400px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.4s ease;
            position: relative;
            overflow: hidden;
        }
        .upload-area:hover {
            border-color: var(--gold);
            background: rgba(212, 175, 55, 0.05);
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.1) inset;
        }
        .upload-icon {
            font-size: 4rem;
            margin-bottom: 20px;
            opacity: 0.8;
        }

        /* AI 科技感扫描动画 */
        .scanner-container {
            display: none;
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0; left: 0;
            background: url('https://images.unsplash.com/photo-1544885935-98dd03b09034?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80') center/cover;
        }
        .scan-line {
            width: 100%;
            height: 5px;
            background: var(--neon-cyan);
            box-shadow: 0 0 20px 5px var(--neon-cyan);
            position: absolute;
            top: 0;
            animation: scan 2s linear infinite;
        }
        @keyframes scan {
            0% { top: 0; }
            50% { top: 100%; }
            100% { top: 0; }
        }
        .processing-text {
            position: absolute;
            bottom: 20px;
            left: 20px;
            font-family: monospace;
            color: var(--neon-cyan);
            background: rgba(0,0,0,0.7);
            padding: 5px 10px;
            border-radius: 4px;
        }

        /* 结果展示区 */
        .result-area {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        .artwork-frame {
            width: 320px;
            height: 320px;
            border-radius: 12px;
            background: #111;
            position: relative;
            box-shadow: 0 0 0 1px rgba(255,255,255,0.1), 0 20px 40px rgba(0,0,0,0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .artwork-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.2;
            transition: opacity 1s ease;
        }
        
        .btn-cyber {
            margin-top: 40px;
            padding: 15px 40px;
            background: transparent;
            color: var(--gold);
            font-size: 1.1rem;
            letter-spacing: 2px;
            border: 1px solid var(--gold);
            border-radius: 30px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: 0.3s;
            opacity: 0;
            transform: translateY(20px);
        }
        .btn-cyber:hover {
            background: var(--gold);
            color: #000;
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.6);
        }

        /* 响应式 */
        @media (max-width: 768px) {
            h1 { font-size: 3rem; letter-spacing: 0.5rem; margin-left: 0.5rem;}
            .ai-workspace { grid-template-columns: 1fr; }
            .stats-container { flex-direction: column; gap: 20px; }
        }
    </style>
</head>
<body>

    <header>
        <div class="hero-bg"></div>
        <h1 class="title-font gradient-text-gold">智绘乡遗</h1>
        <p class="subtitle">计算思维 × 传统非遗 × 乡村振兴</p>
        
        <div class="glass-panel stats-container">
            <div class="stat-item">
                <div class="stat-num gradient-text-tech" id="stat1">0</div>
                <div class="stat-label">已赋能手工艺人</div>
            </div>
            <div class="stat-item">
                <div class="stat-num gradient-text-tech" id="stat2">0</div>
                <div class="stat-label">AI生成创意总数</div>
            </div>
            <div class="stat-item">
                <div class="stat-num gradient-text-tech">￥<span id="stat3">0</span></div>
                <div class="stat-label">累计助农增收(元)</div>
            </div>
        </div>
    </header>

    <main class="main-content">
        <div class="section-header">
            <h2 class="title-font gradient-text-gold">核心引擎：AIGC 非遗风格潜空间映射</h2>
            <p>基于机器视觉与深度学习，将现代图像解构重组为传统非遗文化图样</p>
        </div>

        <div class="glass-panel ai-workspace">
            <!-- 左侧：上传与处理 -->
            <div class="upload-area" id="uploadArea" onclick="document.getElementById('fileInput').click()">
                <div class="upload-icon">💠</div>
                <p style="color: #aaa; letter-spacing: 1px;">点击上传图像，启动AI视觉引擎</p>
                <input type="file" id="fileInput" style="display: none;" accept="image/*" onchange="startCyberScan()">
                
                <!-- 科技感扫描层 (默认隐藏) -->
                <div class="scanner-container" id="scanner">
                    <div class="scan-line"></div>
                    <div class="processing-text" id="logText">INITIATING NEURAL NETWORK...</div>
                </div>
            </div>

            <!-- 右侧：生成结果 -->
            <div class="result-area">
                <div class="artwork-frame">
                    <div style="position: absolute; color: #444; font-family: monospace;" id="placeholderText">AWAITING DATA INPUT</div>
                    <!-- 结果图片：默认是一张好看的非遗剪纸，初始透明度极低 -->
                    <img src="https://images.unsplash.com/photo-1616046229478-9901c5536a45?ixlib=rb-4.0.3&auto=format&fit=crop&w=600&q=80" class="artwork-img" id="resultImg" alt="AI Generated Artwork">
                </div>
                
                <button class="btn-cyber title-font" id="orderBtn" onclick="submitOrder()">将算力化作实体 ▹ 一键助农定制</button>
            </div>
        </div>
    </main>

    <script>
        // 1. 酷炫的数字滚动动画 (一进页面就显得很有数据感)
        function animateValue(id, start, end, duration) {
            let obj = document.getElementById(id);
            let startTimestamp = null;
            const step = (timestamp) => {
                if (!startTimestamp) startTimestamp = timestamp;
                const progress = Math.min((timestamp - startTimestamp) / duration, 1);
                // 增加数字的千位分隔符格式化
                obj.innerHTML = Math.floor(progress * (end - start) + start).toLocaleString();
                if (progress < 1) {
                    window.requestAnimationFrame(step);
                }
            };
            window.requestAnimationFrame(step);
        }

        // 页面加载完成后触发数字滚动
        window.onload = () => {
            animateValue("stat1", 0, 3402, 2000);
            animateValue("stat2", 0, 89145, 2500);
            animateValue("stat3", 0, 1254800, 3000);
        };

        // 2. 极具科技感的 AI 图像处理动画
        function startCyberScan() {
            const uploadBox = document.getElementById('uploadArea');
            const scanner = document.getElementById('scanner');
            const logText = document.getElementById('logText');
            const resultImg = document.getElementById('resultImg');
            const placeholder = document.getElementById('placeholderText');
            const btn = document.getElementById('orderBtn');

            // 锁定上传点击
            uploadBox.onclick = null;
            
            // 显示扫描特效
            scanner.style.display = 'block';
            placeholder.innerText = "PROCESSING LATENT SPACE...";

            // 模拟算法日志输出
            const logs = [
                "EXTRACTING FEATURES...",
                "RUNNING CANNY EDGE DETECTION...",
                "APPLYING STYLE TRANSFER GAN...",
                "OPTIMIZING SVG PATHS...",
                "RENDER COMPLETE."
            ];
            
            let i = 0;
            const interval = setInterval(() => {
                logText.innerText = `> ${logs[i]}`;
                i++;
                if(i >= logs.length) {
                    clearInterval(interval);
                    
                    // 扫描结束，展示特效
                    setTimeout(() => {
                        scanner.style.display = 'none';
                        placeholder.style.display = 'none';
                        resultImg.style.opacity = '1'; // 图片亮起
                        resultImg.style.filter = 'drop-shadow(0 0 20px rgba(212, 175, 55, 0.5))';
                        
                        // 按钮浮现动画
                        btn.style.opacity = '1';
                        btn.style.transform = 'translateY(0)';
                        
                        // 恢复上传功能以便再次体验
                        uploadBox.onclick = () => document.getElementById('fileInput').click();
                    }, 500);
                }
            }, 800); // 调整日志切换速度
        }

        // 3. 助农订单弹窗
        function submitOrder() {
            alert(`【系统级指令通过】\n\n数字创意资产已打包。\n通过边缘计算节点，已将生产图纸发送至：\n📍 陕西省华县皮影非遗工坊\n\n预计手艺人将在 48 小时内完成手工雕刻。\n感谢您对中国乡村非遗传承的算力支持。`);
        }
    </script>
</body>
</html>
